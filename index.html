<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Focus Reader</title>
    
    <link rel="icon" href="image_39.png">
    <link rel="apple-touch-icon" href="image_39.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --ghost: #888;
            --radius: 15px;
        }

        /* 憲法遵守: 角丸15px / iOS Safari対策 / 全域選択禁止 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        textarea { -webkit-user-select: text; user-select: text; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; }

        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 14px;
            border-radius: var(--radius);
        }

        .subtitle { font-size: 0.9rem; color: #666; font-weight: 700; text-align: left; }

        .switcher {
            display: flex;
            background: var(--input-bg);
            padding: 5px;
            border-radius: var(--radius);
            gap: 5px;
            border: 2px solid var(--accent);
        }

        .sw-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            color: #888;
        }

        .sw-btn.active { background: #fff; color: var(--main); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .input-card {
            background: var(--input-bg);
            padding: 18px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            position: relative;
        }

        .input-wrapper { position: relative; }

        textarea {
            width: 100%; height: 140px; padding: 15px; padding-right: 40px;
            border: 2px solid var(--accent); border-radius: var(--radius);
            background: #fff; font-size: 1rem; font-weight: 600;
            color: var(--main) !important; outline: none; resize: none;
            -webkit-appearance: none; -webkit-text-fill-color: var(--main) !important; opacity: 1 !important;
        }
        textarea::placeholder { color: #bbb !important; -webkit-text-fill-color: #bbb !important; opacity: 1 !important; }

        .clr-btn {
            position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;
            background: #ccc; color: #fff; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 16px; font-weight: bold; z-index: 5;
        }

        .action-btn {
            width: 100%; padding: 18px; background: var(--main); color: #fff;
            border: none; border-radius: var(--radius); font-size: 1rem;
            font-weight: 800; cursor: pointer; -webkit-text-fill-color: #fff;
        }
        .action-btn:active { transform: scale(0.98); }

        .output-box {
            width: 100%; min-height: 100px; padding: 18px; background: var(--input-bg);
            border: 2px solid var(--accent); border-radius: var(--radius);
            font-size: 1.05rem; line-height: 1.75; white-space: pre-wrap;
            display: none; font-weight: 600; color: var(--main);
            word-break: break-word;
        }
        .output-box.show { display: block; }
        
        .bone { color: var(--main); font-weight: 800; }
        .flesh { color: var(--ghost); font-weight: 400; }

        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .kofi-btn {
            background: var(--main); color: #fff; text-decoration: none;
            padding: 16px; border-radius: var(--radius); text-align: center;
            font-weight: 900; font-size: 0.9rem; -webkit-text-fill-color: #fff;
        }
        .home-btn {
            background: var(--accent); color: var(--main); border: none;
            padding: 12px; border-radius: var(--radius); font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }

        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 15px; }
        footer a { color: inherit; text-decoration: underline; }

        #homeModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 340px; padding: 35px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .modal-close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Focus Reader</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p id="desc" class="subtitle">Boost your reading speed by focusing on the 'bones'.</p>

    <div class="switcher">
        <button id="btn-en" class="sw-btn active" onclick="setLang('en')">English</button>
        <button id="btn-jp" class="sw-btn" onclick="setLang('jp')">日本語</button>
    </div>

    <div class="input-card">
        <div class="input-wrapper">
            <textarea id="input" placeholder="Paste long text here..." oninput="toggleClr()"></textarea>
            <button class="clr-btn" id="clrBtn" onclick="clearInput()">×</button>
        </div>
    </div>
    
    <button class="action-btn" onclick="focusText()">FOCUS</button>

    <div id="output" class="output-box"></div>

    <div class="footer-btns">
        <a id="kofi-link" href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️ buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer>
        <span id="footer-text">No login / No tracking / No ads / Browser only</span><br>
        <a id="privacy-link" href="https://afrorakda.com/privacy/">Privacy Policy</a> / <span id="copyright">afrorakda © 2026</span>
    </footer>
</div>

<div id="homeModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close-x" onclick="closeModal()">×</span>
        <h3 id="modal-title" style="margin-bottom: 15px; font-weight: 900;">📱 Install</h3>
        <p id="modal-body" style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">
            🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen<br><br>
            🤖 <strong>Android:</strong><br>Menu (⋮) > Add to Home Screen
        </p>
    </div>
</div>

<script>
    let currentLang = 'en';

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('btn-jp').classList.toggle('active', lang === 'jp');
        const input = document.getElementById('input');
        const desc = document.getElementById('desc');
        if(lang === 'jp') {
            input.placeholder = "長い文章をここに貼り付けてください...";
            desc.innerText = "「助詞」を透過させ、意味の核を浮き上がらせます。";
        } else {
            input.placeholder = "Paste long text here...";
            desc.innerText = "Boost your reading speed by focusing on the 'bones'.";
        }
    }

    function toggleClr() {
        const val = document.getElementById('input').value;
        document.getElementById('clrBtn').style.display = val.length > 0 ? 'flex' : 'none';
    }

    function clearInput() {
        document.getElementById('input').value = "";
        document.getElementById('output').classList.remove('show');
        toggleClr();
        document.getElementById('input').focus();
    }

    function focusText() {
        const text = document.getElementById('input').value;
        if(!text) return;

        let processedHtml = "";

        if(currentLang === 'jp') {
            const chunks = text.split(/(？|！|。|\?|!|\n)/g);
            processedHtml = chunks.map(chunk => {
                if (/[？！。?!]/.test(chunk) || chunk === "\n") return chunk;
                if (!chunk.trim()) return chunk;
                let res = chunk.replace(/([一-龠]+[ぁ-ん]{0,2}|[ァ-ヴー]+|[0-9０-９]+|[「」『』【】（）！！”])/g, '___BONE_START___$1___BONE_END___');
                const tailIndex = Math.max(0, chunk.length - 3);
                const tail = chunk.substring(tailIndex);
                if (!res.endsWith('___BONE_END___')) {
                    res = res.substring(0, res.length - tail.length) + '___BONE_START___' + tail + '___BONE_END___';
                }
                return res.split(/(___BONE_START___.*?___BONE_END___)/g).map(part => {
                    if (part.startsWith('___BONE_START___')) {
                        return `<span class="bone">${part.replace('___BONE_START___','').replace('___BONE_END___','')}</span>`;
                    }
                    return part ? `<span class="flesh">${part}</span>` : "";
                }).join('');
            }).join('');
        } else {
            processedHtml = text.split(/(\s+)/).map(part => {
                if (/\s+/.test(part)) return part;
                if (part.length <= 3 || /^[0-9.,?!]+$/.test(part)) {
                    return `<span class="bone">${part}</span>`;
                }
                const bone = part.substring(0, 3);
                const flesh = part.substring(3);
                return `<span class="bone">${bone}</span><span class="flesh">${flesh}</span>`;
            }).join('');
        }

        const output = document.getElementById('output');
        output.innerHTML = processedHtml;
        output.classList.add('show');
        window.scrollTo({ top: output.offsetTop - 20, behavior: 'smooth' });
    }

    function showModal() { document.getElementById('homeModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('homeModal').style.display = 'none'; }

    // 鉄壁ロジック: 削除厳禁
    async function loadFooter() {
        try {
            const response = await fetch('footer.json');
            if (response.ok) {
                const data = await response.json();
                if (data.footerText) document.getElementById('footer-text').innerText = data.footerText;
                if (data.privacyLink) document.getElementById('privacy-link').href = data.privacyLink;
                if (data.copyright) document.getElementById('copyright').innerText = data.copyright;
                if (data.kofiText) document.getElementById('kofi-link').innerText = data.kofiText;
                if (data.modalTitle) document.getElementById('modal-title').innerText = data.modalTitle;
                if (data.modalBody) document.getElementById('modal-body').innerHTML = data.modalBody;
            }
        } catch (e) { console.log("Using static footer."); }
    }
    loadFooter();
</script>

</body>
</html>
